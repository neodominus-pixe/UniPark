<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — UniPark AUST</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/jellee-typeface" type="text/css"/>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    .admin-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Topbar ── */
    .admin-topbar {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
    }
    .admin-topbar-left { display: flex; flex-direction: column; gap: 0.15rem; }
    .admin-topbar-left .logo { font-size: 1.5rem; }
    .admin-topbar-left .admin-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.58rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── Stats ── */
    .admin-stats {
      display: flex;
      width: 100%;
      max-width: 960px;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      animation: fadeUp 0.5s 0.07s ease both;
      opacity: 0;
    }
    .admin-stats .stat-card {
      border-left: none;
      border-top: none;
      border-bottom: none;
    }

    /* ── Controls ── */
    .admin-controls {
      display: flex;
      width: 100%;
      max-width: 960px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      border: 1px solid var(--border);
      gap: 0;
      background: var(--border);
      animation: fadeUp 0.5s 0.12s ease both;
      opacity: 0;
    }
    .admin-controls input,
    .admin-controls select {
      flex: 1;
      min-width: 160px;
      padding: 0.75rem 1.25rem;
      border: none;
      background: var(--surface);
      color: var(--ivory);
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .admin-controls input::placeholder { color: var(--muted); }
    .admin-controls input:focus,
    .admin-controls select:focus { outline: none; background: var(--surface-2); }
    .admin-controls select option { background: var(--surface); color: var(--text-on-light); }

    /* ── Table container ── */
    .table-container {
      width: 100%;
      max-width: 960px;
      animation: fadeUp 0.5s 0.18s ease both;
      opacity: 0;
    }
    .table-wrap {
      border: 1px solid var(--border);
      overflow: hidden;
      overflow-x: auto;
    }

    /* Override base table for dark theme */
    thead th {
      background: var(--bg);
      color: var(--gold);
    }
    tbody { background: var(--surface); }
    tbody td { border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }

    .phone-link {
      color: var(--plum);
      text-decoration: none;
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .phone-link:hover { color: var(--text-on-light); text-decoration: underline; }

    .plate-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      color: var(--text-on-light);
    }

    .time-cell {
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.72rem;
      color: var(--plum);
      white-space: nowrap;
    }

    .empty-row td {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── AI Insights ── */
    .insights-card {
      width: 100%;
      max-width: 960px;
      margin-top: 2rem;
      border: 1px solid var(--border);
      padding: 2rem;
      background: var(--surface);
      animation: fadeUp 0.5s 0.24s ease both;
      opacity: 0;
    }

    .insights-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .insights-title {
      font-family: 'JelleeRegular', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-on-light);
      letter-spacing: 0.06em;
      margin: 0;
    }

    .insights-sub {
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    .insights-body {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .insights-body.is-loading {
      text-align: center;
      color: var(--plum);
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 1.5rem 0;
    }

    .insights-body.is-error {
      color: var(--danger);
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      background: rgba(176, 58, 46, 0.06);
      padding: 0.875rem 1.25rem;
      border-left: 2px solid var(--danger);
    }

    .insight-item {
      display: flex;
      gap: 0.875rem;
      margin-bottom: 0.875rem;
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.875rem;
      color: var(--text-on-light);
      line-height: 1.65;
    }

    .insight-item:last-child { margin-bottom: 0; }

    .insight-dot {
      width: 4px;
      height: 4px;
      background: var(--plum);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.55rem;
    }

    @media (max-width: 600px) {
      .admin-page { padding: 1.5rem 1rem 3rem; }
      .admin-stats { flex-direction: column; }
      .admin-controls { flex-direction: column; }
      .admin-topbar { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .insights-card { padding: 1.25rem; }

      /* Hide Student ID, Arrived, Est. Departure — keep Name, Phone, Plate, Zone, Spot, Action */
      .table-wrap th:nth-child(2),
      .table-wrap td:nth-child(2),
      .table-wrap th:nth-child(7),
      .table-wrap td:nth-child(7),
      .table-wrap th:nth-child(8),
      .table-wrap td:nth-child(8) {
        display: none;
      }

      thead th, tbody td { padding: 0.6rem 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="admin-page">

    <!-- Topbar -->
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <a href="../index.html" class="logo">Uni<span>Park</span></a>
        <span class="admin-label">Security Dashboard</span>
      </div>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign Out</button>
    </div>

    <!-- Stats -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-label">Active Cars</div>
        <div class="stat-value accent" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Exited Today</div>
        <div class="stat-value green" id="stat-exited">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Capacity</div>
        <div class="stat-value" id="stat-total" style="color:var(--muted);">—</div>
      </div>
    </div>

    <!-- Search + Filter -->
    <div class="admin-controls">
      <input
        type="text"
        id="search-input"
        placeholder="Search by name, plate or student ID…"
      />
      <select id="zone-filter">
        <option value="">All Zones</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-container">
      <div id="loading" class="loading">Loading parking data…</div>

      <div class="table-wrap" id="table-wrap" style="display:none;">
        <table>
          <thead>
            <tr>
              <th>Student Name</th>
              <th>Student ID</th>
              <th>Phone</th>
              <th>Plate</th>
              <th>Zone</th>
              <th>Spot</th>
              <th>Arrived</th>
              <th>Est. Departure</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="cars-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- AI Insights -->
    <div class="insights-card">
      <div class="insights-header">
        <div>
          <h3 class="insights-title">AI Insights</h3>
          <p class="insights-sub">Occupancy pattern analysis</p>
        </div>
        <button class="btn btn-sm" id="insights-btn">Generate Insights</button>
      </div>
      <div id="insights-body" class="insights-body"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
