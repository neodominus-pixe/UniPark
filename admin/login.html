<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Login — UniPark AUST</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/jellee-typeface" type="text/css"/>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    .login-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      background:
        radial-gradient(ellipse 50% 60% at 50% 40%, rgba(36,58,94,0.12) 0%, transparent 70%),
        var(--bg);
    }

    .login-brand {
      margin-bottom: 2.5rem;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }
    .login-brand .logo { font-size: 1.75rem; }
    .login-brand .brand-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      animation: fadeUp 0.55s 0.1s ease both;
      opacity: 0;
    }
    .login-card::before, .login-card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--gold);
      border-style: solid;
    }
    .login-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .login-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .login-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.85rem;
      font-weight: 500;
      color: var(--text-on-light);
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
    }
    .login-card .subtitle {
      font-family: 'Raleway', sans-serif;
      color: var(--muted-light);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.75rem;
      color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      transition: color 0.25s;
      animation: fadeUp 0.5s 0.25s ease both;
      opacity: 0;
    }
    .back-link:hover { color: var(--gold); }

    /* ── Password toggle ── */
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 3rem; }
    .pwd-toggle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 3rem;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s;
      padding: 0;
    }
    .pwd-toggle:hover { color: var(--plum); }

    /* ── Forgot / back link ── */
    .forgot-link {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: center;
      margin-top: 1.25rem;
      color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
      transition: color 0.25s;
      padding: 0;
    }
    .forgot-link:hover { color: var(--plum); }

    @media (max-width: 480px) {
      .login-brand { margin-bottom: 1.5rem; }
      .login-brand .logo { font-size: 1.4rem; }
      .login-card { padding: 1.5rem 1.25rem; }
      .login-card h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">

    <div class="login-brand">
      <a href="../index.html" class="logo">Uni<span>Park</span></a>
      <p class="brand-sub">Security Access Portal</p>
    </div>

    <div class="login-card">

      <!-- ── Login view ── -->
      <div id="login-view">
        <h2>Security Login</h2>
        <p class="subtitle">Authorized personnel only</p>

        <div id="form-message" class="form-message" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              placeholder="admin@aust.edu"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="Show password">
                <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn" id="login-btn">Sign In</button>
        </form>

        <button type="button" class="forgot-link" id="forgot-link">Forgot password?</button>
      </div>

      <!-- ── Forgot password view ── -->
      <div id="forgot-view" style="display:none;">
        <h2>Reset Password</h2>
        <p class="subtitle">We'll send a link to your inbox</p>

        <div id="forgot-message" class="form-message" role="alert"></div>

        <div class="form-group">
          <label for="reset-email">Email Address</label>
          <input
            type="email"
            id="reset-email"
            placeholder="admin@aust.edu"
            autocomplete="email"
          />
        </div>

        <button type="button" class="btn" id="reset-btn">Send Reset Link</button>
        <button type="button" class="forgot-link" id="back-link">← Back to login</button>
      </div>

    </div>

    <a href="../index.html" class="back-link">← Back to UniPark</a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/admin-login.js"></script>
</body>
</html>
