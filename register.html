<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register My Car — UniPark AUST</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/jellee-typeface" type="text/css"/>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    .lot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    @media (max-width: 600px) {
      .lot-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .lot-zone { background: var(--bg); padding: 0.75rem 0.6rem; }
    .lot-zone-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .lot-zone-letter {
      font-family: 'JelleeRegular', sans-serif;
      font-size: 0.95rem;
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--plum);
      border: 1px solid var(--border);
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lot-zone-letter.active {
      background: var(--plum);
      color: #EDF4FA;
      border-color: var(--plum);
    }
    .lot-zone-meta {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: 'JelleeRegular', sans-serif;
    }
    .lot-zone-spots { display: flex; flex-direction: column; gap: 3px; }
    .lot-spot {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      min-height: 34px;
    }
    .lot-spot.available {
      border: 1px dashed rgba(36,58,94,0.25);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .lot-spot.available:hover {
      background: var(--surface);
      border-color: var(--plum);
      border-style: solid;
    }
    .lot-spot.occupied {
      background: var(--surface-2);
      border: 1px solid var(--border);
      cursor: not-allowed;
    }
    .lot-spot.selected {
      background: var(--plum);
      border: 1px solid var(--plum);
      cursor: pointer;
    }
    .lot-spot-label {
      font-size: 0.58rem;
      color: var(--muted);
      min-width: 22px;
      font-family: 'JelleeRegular', sans-serif;
      letter-spacing: 0.04em;
    }
    .lot-spot.selected .lot-spot-label { color: rgba(237,244,250,0.65); }
    .lot-car { flex: 1; height: 20px; display: none; }
    .lot-spot.occupied .lot-car { display: block; fill: var(--plum); opacity: 0.7; }
    .lot-spot.selected .lot-car { display: block; fill: rgba(237,244,250,0.9); }
    .lot-loading {
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0.5rem 0;
      font-family: 'JelleeRegular', sans-serif;
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="lot-car-icon" viewBox="0 0 40 80">
        <rect x="6" y="4" width="28" height="72" rx="6" ry="6"/>
        <rect x="10" y="14" width="20" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
        <rect x="10" y="52" width="20" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
        <rect x="10" y="34" width="20" height="12" fill="rgba(255,255,255,0.15)"/>
      </symbol>
    </defs>
  </svg>

  <div class="page">

    <nav class="topbar">
      <a href="index.html" class="logo">Uni<span>Park</span></a>
      <div class="topbar-links">
        <a href="dashboard.html">View Parking</a>
        <a href="find-blocker.html">Find Blocker</a>
      </div>
    </nav>

    <div class="card">
      <div class="card-header">
        <h2>Register My Car</h2>
        <p>Fill in your details to park at AUST campus</p>
      </div>

      <div id="form-message" class="form-message" role="alert"></div>

      <form id="register-form" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="student_name">Full Name</label>
            <input type="text" id="student_name" placeholder="e.g. Ali Hassan" required />
          </div>
          <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" placeholder="e.g. 2023123456" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone_number">Phone Number</label>
            <div class="phone-input-wrap">
              <button type="button" class="phone-code-btn" id="phone-code-btn" aria-label="Select country code">
                <span id="phone-flag">🇱🇧</span>
                <span id="phone-code-display">+961</span>
                <svg class="phone-chevron" xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg>
              </button>
              <div class="phone-dropdown" id="phone-dropdown">
                <input type="text" class="phone-search" id="phone-search" placeholder="Search country or code…" autocomplete="off"/>
                <ul class="phone-list" id="phone-list" role="listbox"></ul>
              </div>
              <input type="tel" id="phone_number" placeholder="79 123 456" required autocomplete="tel-national"/>
            </div>
          </div>
          <div class="form-group">
            <label for="plate_number">Plate Number</label>
            <div class="phone-input-wrap">
              <button type="button" class="phone-code-btn" id="plate-prefix-btn" aria-label="Select plate prefix">
                <span id="plate-prefix-display">B</span>
                <svg class="phone-chevron" xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg>
              </button>
              <div class="phone-dropdown" id="plate-prefix-dropdown">
                <ul class="plate-prefix-list" id="plate-prefix-list" role="listbox"></ul>
              </div>
              <input type="text" id="plate_number" placeholder="12345" required autocomplete="off"/>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Select Your Spot</label>
          <div id="lot-container">
            <p class="lot-loading">Loading parking lot…</p>
          </div>
          <input type="hidden" id="zone" />
          <input type="hidden" id="spot_number" />
        </div>

        <div class="form-group">
          <label for="departure_time">Estimated Departure</label>
          <input type="datetime-local" id="departure_time" required />
        </div>

        <button type="submit" class="btn" id="submit-btn">Register My Car</button>
        <p class="clear-info-wrap"><a href="#" id="clear-info-link" onclick="clearSavedInfo(); return false;">Clear saved info</a></p>

      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/register.js"></script>

  <script type="text/javascript">
    (function(d, t) {
        var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
        v.onload = function() {
          window.voiceflow.chat.load({
            verify: { projectID: '6a2078554865068a895c1e74' },
            url: 'https://general-runtime.voiceflow.com',
            voice: {
              url: "https://runtime-api.voiceflow.com"
            }
          });
        }
        v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
    })(document, 'script');
  </script>
</body>
</html>
