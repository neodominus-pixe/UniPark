<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register My Car — UniPark AUST</title>
  <link rel="stylesheet" media="screen" href="https://fontlibrary.org//face/jellee-typeface" type="text/css"/>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    .zone-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .zone-card {
      background: var(--surface);
      border: none;
      padding: 1.25rem 0.75rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.2s;
      outline: none;
    }
    .zone-card:hover { background: var(--surface-2); }
    .zone-card.active { background: var(--plum); }
    .zone-letter {
      font-family: 'JelleeRegular', sans-serif;
      font-size: 2rem;
      color: var(--plum);
      line-height: 1;
      transition: color 0.2s;
    }
    .zone-card.active .zone-letter { color: #EDF4FA; }
    .zone-sub {
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JelleeRegular', sans-serif;
      transition: color 0.2s;
    }
    .zone-card.active .zone-sub { color: rgba(237,244,250,0.6); }
    .zone-loading {
      padding: 1rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-family: 'JelleeRegular', sans-serif;
      grid-column: 1 / -1;
    }
    .spot-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .spot-btn {
      background: var(--surface);
      border: none;
      aspect-ratio: 1;
      cursor: pointer;
      font-family: 'JelleeRegular', sans-serif;
      font-size: 1.05rem;
      color: var(--plum);
      transition: background 0.2s, color 0.2s;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spot-btn:hover  { background: var(--surface-2); }
    .spot-btn.active { background: var(--plum); color: #EDF4FA; }
  </style>
</head>
<body>
  <div class="page">

    <nav class="topbar">
      <a href="index.html" class="logo">Uni<span>Park</span></a>
      <div class="topbar-links">
        <a href="dashboard.html">View Parking</a>
        <a href="find-blocker.html">Find Blocker</a>
      </div>
    </nav>

    <div class="card">
      <div class="card-header">
        <h2>Register My Car</h2>
        <p>Fill in your details to park at AUST campus</p>
      </div>

      <div id="form-message" class="form-message" role="alert"></div>

      <form id="register-form" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="student_name">Full Name</label>
            <input type="text" id="student_name" placeholder="e.g. Ali Hassan" required />
          </div>
          <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" placeholder="e.g. 2023123456" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone_number">Phone Number</label>
            <div class="phone-input-wrap">
              <button type="button" class="phone-code-btn" id="phone-code-btn" aria-label="Select country code">
                <span id="phone-flag">🇱🇧</span>
                <span id="phone-code-display">+961</span>
                <svg class="phone-chevron" xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg>
              </button>
              <div class="phone-dropdown" id="phone-dropdown">
                <input type="text" class="phone-search" id="phone-search" placeholder="Search country or code…" autocomplete="off"/>
                <ul class="phone-list" id="phone-list" role="listbox"></ul>
              </div>
              <input type="tel" id="phone_number" placeholder="79 123 456" required autocomplete="tel-national"/>
            </div>
          </div>
          <div class="form-group">
            <label for="plate_number">Plate Number</label>
            <div class="phone-input-wrap">
              <button type="button" class="phone-code-btn" id="plate-prefix-btn" aria-label="Select plate prefix">
                <span id="plate-prefix-display">B</span>
                <svg class="phone-chevron" xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 1l4 4 4-4"/></svg>
              </button>
              <div class="phone-dropdown" id="plate-prefix-dropdown">
                <ul class="plate-prefix-list" id="plate-prefix-list" role="listbox"></ul>
              </div>
              <input type="text" id="plate_number" placeholder="12345" required autocomplete="off"/>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Parking Zone</label>
          <div class="zone-picker" id="zone-picker">
            <p class="zone-loading">Loading zones…</p>
          </div>
          <input type="hidden" id="zone" />
        </div>

        <div class="form-group" id="spot-group" style="display:none;">
          <label>Spot Number</label>
          <div class="spot-grid" id="spot-grid"></div>
          <input type="hidden" id="spot_number" />
        </div>

        <div class="form-group">
          <label for="departure_time">Estimated Departure</label>
          <input type="datetime-local" id="departure_time" required />
        </div>

        <button type="submit" class="btn" id="submit-btn">Register My Car</button>
        <p class="clear-info-wrap"><a href="#" id="clear-info-link" onclick="clearSavedInfo(); return false;">Clear saved info</a></p>

      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/register.js"></script>

  <script type="text/javascript">
    (function(d, t) {
        var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
        v.onload = function() {
          window.voiceflow.chat.load({
            verify: { projectID: '6a0f5130506cbd7fd69af9ba' },
            url: 'https://general-runtime.voiceflow.com',
            voice: {
              url: "https://runtime-api.voiceflow.com"
            }
          });
        }
        v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript"; s.parentNode.insertBefore(v, s);
    })(document, 'script');
  </script>
</body>
</html>
