<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Dashboard — UniPark AUST</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <div class="page">

    <nav class="topbar">
      <a href="index.html" class="logo">Uni<span>Park</span></a>
      <div class="topbar-links">
        <a href="register.html">Park My Car</a>
        <a href="find-blocker.html">Find Blocker</a>
      </div>
    </nav>

    <div id="page-message" class="form-message" role="alert"
         style="width:100%;max-width:680px;margin-bottom:1.25rem;"></div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Cars Parked</div>
        <div class="stat-value accent" id="stat-active">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Spots Available</div>
        <div class="stat-value green" id="stat-available">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Capacity</div>
        <div class="stat-value" style="color:#94a3b8;" id="stat-total">—</div>
      </div>
    </div>

    <div id="loading" class="loading" style="width:100%;max-width:680px;">
      Loading parking data…
    </div>

    <div id="zones-container" style="display:none;width:100%;max-width:680px;"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
